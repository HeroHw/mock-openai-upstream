# docker-compose for the mockupstream service.
#
#   docker compose up --build        # start (foreground)
#   docker compose up -d --build     # start (detached)
#   docker compose down              # stop and remove
#
# Point a gateway channel's BaseURL at http://mockupstream:18080 (same network)
# or http://localhost:18080 (from the host) — the gateway needs no code change.
#
# SECURITY: this service does no auth by default. Only the published localhost
# port is exposed here; do not bind it to a public interface.

services:
  mockupstream:
    build:
      context: .
      dockerfile: Dockerfile
    image: mockupstream:latest
    container_name: mockupstream
    # The container always listens on :18080. Customize the HOST-side port here
    # — change the left number (e.g. "9000:18080" to reach it on localhost:9000).
    # Bound to loopback only, since the mock does no auth by default.
    ports:
      - "18080:18080"
    # All behavior is configurable via env vars (or a mounted JSON config).
    # Uncomment the `environment:` block and any knobs you need.
    # environment:
    #   MOCK_TTFT_MS: "200"            # SSE first-byte delay
    #   MOCK_TOKEN_INTERVAL_MS: "20"   # per-token interval
    #   MOCK_ERROR_RATE: "0.3"         # deterministic error injection
    #   MOCK_ERROR_STATUS: "503"
    #   MOCK_API_KEY: "sk-mock-secret" # enable fixed Bearer auth
    #   # --- faster image/video for quick integration (default 60s) ---
    #   MOCK_IMAGE_SYNC_DELAY_S: "5"
    #   MOCK_VIDEO_SYNC_DELAY_S: "5"
    #   MOCK_IMAGE_DURATION_S: "5"
    #   MOCK_VIDEO_DURATION_S: "5"
    #   MOCK_VIDEO_CONCURRENCY: "2"
    # Optional: mount a JSON config file and point the binary at it. Env vars
    # above still override the file.
    volumes:
      - ./config.example.json:/config.json:ro
    command: ["-config", "/config.json"]
    healthcheck:
      # Reuse the binary's self-probe (scratch image has no curl).
      test: ["CMD", "/mockupstream", "-healthcheck"]
      interval: 10s
      timeout: 3s
      start_period: 2s
      retries: 3
    restart: unless-stopped
