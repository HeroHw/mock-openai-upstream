# docker-compose for the mockupstream service.
#
#   docker compose up --build        # start (foreground)
#   docker compose up -d --build     # start (detached)
#   docker compose down              # stop and remove
#
# Point a gateway channel's BaseURL at http://mockupstream:9050 (same network)
# or http://localhost:9050 (from the host) — the gateway needs no code change.
#
# SECURITY: this service does no auth by default. Only the published localhost
# port is exposed here; do not bind it to a public interface.

services:
  mockupstream:
    build:
      context: .
      dockerfile: Dockerfile
    image: mockupstream:latest
    container_name: mockupstream
    # The container always listens on :9050. Customize the HOST-side port here
    # — change the left number (e.g. "9000:9050" to reach it on localhost:9000).
    # Bound to loopback only, since the mock does no auth by default.
    ports:
      - "${PORT:-9050}:9050"
    # All behavior is configurable via env vars (or a mounted JSON config).
    # Uncomment the `environment:` block and any knobs you need.
    # environment:
    #   MOCK_TTFT_MIN_MS: "1000"           # SSE first-byte delay min (ms)
    #   MOCK_TTFT_MAX_MS: "30000"          # SSE first-byte delay max (ms)
    #   MOCK_TOKEN_INTERVAL_MS: "20"       # per-token interval
    #   MOCK_LATENCY_MIN_MS: "1000"        # non-streaming latency min (ms)
    #   MOCK_LATENCY_MAX_MS: "10000"       # non-streaming latency max (ms)
    #   MOCK_ERROR_RATE: "0.3"             # deterministic error injection
    #   MOCK_ERROR_STATUS: "503"
    #   MOCK_API_KEY: "sk-mock-secret"     # enable fixed Bearer auth
    #   # --- random delays for image/video (default [1,30]s) ---
    #   MOCK_IMAGE_SYNC_DELAY_MIN_S: "1"
    #   MOCK_IMAGE_SYNC_DELAY_MAX_S: "30"
    #   MOCK_VIDEO_SYNC_DELAY_MIN_S: "1"
    #   MOCK_VIDEO_SYNC_DELAY_MAX_S: "30"
    #   MOCK_IMAGE_DURATION_MIN_S: "1"
    #   MOCK_IMAGE_DURATION_MAX_S: "30"
    #   MOCK_VIDEO_DURATION_MIN_S: "1"
    #   MOCK_VIDEO_DURATION_MAX_S: "30"
    #   MOCK_VIDEO_CONCURRENCY: "2"
    # Optional: mount a JSON config file and point the binary at it. Env vars
    # above still override the file.
    volumes:
      - ./config.json:/config.json:ro
    command: ["-config", "/config.json"]
    # Resource limits sized for an 8-core / 32G host running the load generator
    # on the same machine: give the mock 6 cores and 16G, leaving 2 cores + RAM
    # for the host and the load tool. GOMAXPROCS is pinned to the CPU limit so
    # the Go runtime schedules to the cgroup quota, not the host's 8 cores.
    # Each in-flight 10MB b64 response holds its payload in the socket buffer, so
    # 16G comfortably absorbs hundreds of concurrent large responses.
    environment:
      GOMAXPROCS: "6"
      # --- load-test tuning: env overrides the mounted config.json (doc §4) ---
      # Disable the random 1~30s sync delay so the test measures throughput /
      # bandwidth of the 10MB b64 response, not the artificial wait. Remove these
      # two lines to restore the configured latency behavior.
      MOCK_IMAGE_SYNC_DELAY_MIN_S: "0"
      MOCK_IMAGE_SYNC_DELAY_MAX_S: "0"
    deploy:
      resources:
        limits:
          cpus: "6"
          memory: 16G
        reservations:
          cpus: "2"
          memory: 2G
    # High concurrency opens many sockets at once; raise the open-file limit so
    # the mock doesn't hit the default 1024 fd cap under load.
    ulimits:
      nofile:
        soft: 1048576
        hard: 1048576
    healthcheck:
      # Reuse the binary's self-probe (scratch image has no curl).
      test: ["CMD", "/mockupstream", "-healthcheck"]
      interval: 10s
      timeout: 3s
      start_period: 2s
      retries: 3
    restart: unless-stopped
